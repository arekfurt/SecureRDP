[Mode]
Name=SSH + RDP Basic Prototype Mode
Description=Blocks direct RDP and tunnels it through an SSH connection using public key authentication.
Version=0.85
Author=SecureRDP
Details=Configures OpenSSH Server with hardened settings (ED25519 keys, no password auth), restricts RDP access via firewall rules and optional loopback binding, and generates encrypted portable client connection packages.
QuickStartDescription=Configure SSH tunnel and generate a client package.
